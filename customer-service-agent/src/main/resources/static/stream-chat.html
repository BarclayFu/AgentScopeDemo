<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>智能客服 - SSE流式聊天演示</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                width: 100%;
                max-width: 900px;
                height: 80vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px;
                text-align: center;
            }

            .header h1 {
                font-size: 28px;
                margin-bottom: 8px;
            }

            .header p {
                font-size: 14px;
                opacity: 0.9;
            }

            .status-badge {
                display: inline-block;
                padding: 5px 15px;
                border-radius: 20px;
                background: rgba(255, 255, 255, 0.2);
                margin-top: 10px;
                font-size: 13px;
            }

            .chat-container {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                background: #f5f7fa;
            }

            .message {
                margin-bottom: 20px;
                display: flex;
                align-items: flex-start;
            }

            .message.user {
                justify-content: flex-end;
            }

            .message-content {
                max-width: 70%;
                padding: 15px 20px;
                border-radius: 15px;
                position: relative;
                animation: fadeIn 0.3s ease-in;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .message.user .message-content {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border-radius: 15px 15px 0 15px;
            }

            .message.assistant .message-content {
                background: white;
                color: #333;
                border: 1px solid #e1e8ed;
                border-radius: 15px 15px 15px 0;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            }

            .message-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                margin: 0 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
            }

            .message.user .message-avatar {
                order: 2;
                background: #667eea;
                color: white;
            }

            .message.assistant .message-avatar {
                background: #764ba2;
                color: white;
            }

            .typing-indicator {
                display: inline-flex;
                gap: 4px;
                padding: 10px 15px;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 15px;
                margin-left: 50px;
            }

            .typing-indicator span {
                width: 8px;
                height: 8px;
                background: #667eea;
                border-radius: 50%;
                animation: typing 1.4s infinite;
            }

            .typing-indicator span:nth-child(2) {
                animation-delay: 0.2s;
            }

            .typing-indicator span:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes typing {
                0%,
                60%,
                100% {
                    transform: translateY(0);
                }
                30% {
                    transform: translateY(-10px);
                }
            }

            .input-container {
                padding: 20px;
                background: white;
                border-top: 1px solid #e1e8ed;
            }

            .input-wrapper {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
            }

            .input-field {
                flex: 1;
                padding: 15px 20px;
                border: 2px solid #e1e8ed;
                border-radius: 25px;
                font-size: 15px;
                outline: none;
                transition: all 0.3s;
            }

            .input-field:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }

            .send-button {
                padding: 15px 30px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border: none;
                border-radius: 25px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }

            .send-button:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }

            .send-button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .controls {
                display: flex;
                align-items: center;
                gap: 20px;
                flex-wrap: wrap;
            }

            .control-group {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .control-group label {
                font-size: 14px;
                color: #666;
                font-weight: 500;
            }

            .control-group input[type="range"] {
                width: 150px;
                accent-color: #667eea;
            }

            .control-group select {
                padding: 8px 15px;
                border: 2px solid #e1e8ed;
                border-radius: 10px;
                font-size: 14px;
                outline: none;
                cursor: pointer;
            }

            .control-group select:focus {
                border-color: #667eea;
            }

            .streaming-status {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 15px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 500;
            }

            .streaming-status.connected {
                background: rgba(76, 175, 80, 0.1);
                color: #4caf50;
            }

            .streaming-status.streaming {
                background: rgba(102, 126, 234, 0.1);
                color: #667eea;
            }

            .streaming-status.disconnected {
                background: rgba(244, 67, 54, 0.1);
                color: #f44336;
            }

            .streaming-status .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: currentColor;
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }

            .error-message {
                padding: 10px 15px;
                background: rgba(244, 67, 54, 0.1);
                border-left: 4px solid #f44336;
                color: #f44336;
                margin: 10px 0;
                border-radius: 5px;
                font-size: 14px;
            }

            @media (max-width: 768px) {
                .container {
                    height: 100vh;
                    border-radius: 0;
                }

                .message-content {
                    max-width: 85%;
                }

                .controls {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }

            /* 自定义滚动条 */
            .chat-container::-webkit-scrollbar {
                width: 8px;
            }

            .chat-container::-webkit-scrollbar-track {
                background: #f5f7fa;
            }

            .chat-container::-webkit-scrollbar-thumb {
                background: #667eea;
                border-radius: 4px;
            }

            .chat-container::-webkit-scrollbar-thumb:hover {
                background: #764ba2;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🤖 智能客服 Agent</h1>
                <p>SSE流式响应演示 - 打字机效果</p>
                <div class="status-badge">
                    <span>✨ 实时逐字输出 | ⚡ Server-Sent Events技术</span>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <!-- 欢迎消息 -->
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p>你好！我是智能客服助手。</p>
                        <p style="margin-top: 10px">
                            ✨ 本演示使用 SSE
                            流式传输技术，为您提供实时的打字机效果。
                        </p>
                        <p style="margin-top: 10px">📋 您可以尝试以下问题：</p>
                        <ul style="margin-left: 20px; margin-top: 5px">
                            <li>查询订单 ORD001 的状态</li>
                            <li>我想办理退款</li>
                            <li>如何联系人工客服？</li>
                            <li>查询 iPhone 15 Pro 的信息</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <input
                        type="text"
                        class="input-field"
                        id="messageInput"
                        placeholder="输入您的问题..."
                        autocomplete="off"
                    />
                    <button class="send-button" id="sendButton">发送</button>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label for="speedRange">打字速度:</label>
                        <input
                            type="range"
                            id="speedRange"
                            min="0"
                            max="100"
                            value="30"
                        />
                        <span id="speedValue">30ms</span>
                    </div>

                    <div class="control-group">
                        <label for="userIdSelect">用户ID:</label>
                        <select id="userIdSelect">
                            <option value="user001">user001</option>
                            <option value="user002">user002</option>
                            <option value="user003">user003</option>
                        </select>
                    </div>

                    <div
                        class="streaming-status connected"
                        id="streamingStatus"
                    >
                        <span class="dot"></span>
                        <span id="statusText">已就绪</span>
                    </div>

                    <button
                        class="send-button"
                        id="clearButton"
                        style="
                            background: linear-gradient(
                                135deg,
                                #f44336 0%,
                                #e53935 100%
                            );
                            padding: 8px 20px;
                            font-size: 14px;
                        "
                    >
                        清空对话
                    </button>
                </div>
            </div>
        </div>

        <script>
            // 全局变量
            let eventSource = null;
            let currentAssistantMessage = null;
            let isStreaming = false;

            // DOM元素
            const chatContainer = document.getElementById("chatContainer");
            const messageInput = document.getElementById("messageInput");
            const sendButton = document.getElementById("sendButton");
            const clearButton = document.getElementById("clearButton");
            const speedRange = document.getElementById("speedRange");
            const speedValue = document.getElementById("speedValue");
            const userIdSelect = document.getElementById("userIdSelect");
            const streamingStatus = document.getElementById("streamingStatus");
            const statusText = document.getElementById("statusText");

            // 更新速度显示
            speedRange.addEventListener("input", function () {
                speedValue.textContent = this.value + "ms";
            });

            // 发送消息
            async function sendMessage() {
                const message = messageInput.value.trim();
                const userId = userIdSelect.value;
                const streamInterval = parseInt(speedRange.value);

                if (!message || isStreaming) {
                    return;
                }

                // 重置状态标志
                window.streamEndedNormally = false;
                window.errorShown = false;

                // 禁用输入
                messageInput.disabled = true;
                sendButton.disabled = true;
                isStreaming = true;

                // 添加用户消息
                addMessage("user", message);
                messageInput.value = "";

                // 更新状态
                updateStreamingStatus("streaming", "正在接收响应...");

                try {
                    // 显示打字指示器
                    const typingIndicator = showTypingIndicator();

                    // 创建SSE连接
                    eventSource = new EventSource(
                        `/api/chat/stream?userId=${encodeURIComponent(userId)}&message=${encodeURIComponent(message)}&stream=true&streamInterval=${streamInterval}`,
                    );

                    let fullResponse = "";
                    let assistantMessageElement = null;
                    let streamEnded = false; // 标记流是否已结束

                    eventSource.onmessage = function (event) {
                        const data = event.data;

                        // 隐藏打字指示器
                        if (typingIndicator && typingIndicator.parentNode) {
                            typingIndicator.parentNode.removeChild(
                                typingIndicator,
                            );
                        }

                        // 检查是否为结束信号
                        if (data === "[DONE]") {
                            streamEnded = true; // 标记正常结束
                            eventSource.close();
                            finishStreaming();
                            return;
                        }

                        // 检查是否为错误消息
                        if (data.startsWith("{") || data.startsWith("error")) {
                            streamEnded = true; // 标记已结束
                            showError(data);
                            eventSource.close();
                            finishStreaming();
                            return;
                        }

                        // 正常的流式数据 - 直接追加纯文本
                        fullResponse += data;

                        // 如果还没创建助手消息元素，创建它
                        if (!assistantMessageElement) {
                            assistantMessageElement = addMessage(
                                "assistant",
                                "",
                                true,
                            );
                        }

                        // 更新消息内容
                        updateAssistantMessage(
                            assistantMessageElement,
                            fullResponse,
                        );

                        // 自动滚动到底部
                        scrollToBottom();
                    };

                    eventSource.onerror = function (error) {
                        // 如果流已正常结束，不处理错误
                        if (streamEnded) {
                            console.log("流式输出已正常结束");
                            return;
                        }

                        // 如果流未正常结束，才作为错误处理
                        console.error("SSE连接错误:", error);
                        eventSource.close();

                        // 隐藏打字指示器
                        if (typingIndicator && typingIndicator.parentNode) {
                            typingIndicator.parentNode.removeChild(
                                typingIndicator,
                            );
                        }

                        showError("连接错误，请重试");
                        finishStreaming();
                    };
                } catch (error) {
                    console.error("发送消息失败:", error);
                    showError("发送失败: " + error.message);
                    finishStreaming();
                }
            }

            // 添加消息到聊天容器
            function addMessage(role, content, isStreaming = false) {
                const messageDiv = document.createElement("div");
                messageDiv.className = `message ${role}`;

                const avatar = document.createElement("div");
                avatar.className = "message-avatar";
                avatar.textContent = role === "user" ? "👤" : "🤖";

                const messageContent = document.createElement("div");
                messageContent.className = "message-content";
                messageContent.textContent = content;

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(messageContent);

                chatContainer.appendChild(messageDiv);
                scrollToBottom();

                return messageContent;
            }

            // 更新助手消息内容
            function updateAssistantMessage(element, content) {
                // 将换行符转换为 <br> 标签
                const formattedContent = content.replace(/\n/g, "<br>");
                element.innerHTML = formattedContent;
            }

            // 显示打字指示器
            function showTypingIndicator() {
                const indicator = document.createElement("div");
                indicator.className = "typing-indicator";
                indicator.innerHTML = `
                <span></span>
                <span></span>
                <span></span>
            `;

                const wrapper = document.createElement("div");
                wrapper.appendChild(indicator);
                chatContainer.appendChild(wrapper);
                scrollToBottom();

                return wrapper;
            }

            // 显示错误消息
            function showError(message) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "error-message";
                errorDiv.textContent = message;
                chatContainer.appendChild(errorDiv);
                scrollToBottom();
            }

            // 完成流式输出
            function finishStreaming() {
                isStreaming = false;
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
                updateStreamingStatus("connected", "已就绪");
            }

            // 更新流式状态
            function updateStreamingStatus(status, text) {
                streamingStatus.className = `streaming-status ${status}`;
                statusText.textContent = text;
            }

            // 滚动到底部
            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // 清空对话
            function clearChat() {
                chatContainer.innerHTML = "";
                // 添加欢迎消息
                addMessage("assistant", "对话已清空。您可以开始新的对话！");
            }

            // 事件监听
            sendButton.addEventListener("click", sendMessage);

            messageInput.addEventListener("keypress", function (e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            clearButton.addEventListener("click", clearChat);

            // 页面加载完成后聚焦输入框
            window.onload = function () {
                messageInput.focus();
            };

            // 页面关闭时关闭SSE连接
            window.onbeforeunload = function () {
                if (eventSource) {
                    eventSource.close();
                }
            };
        </script>
    </body>
</html>
